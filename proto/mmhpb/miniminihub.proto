syntax = "proto3";

package miniminihub.v1;

option go_package = "github.com/jmlmvi/miniminihub/proto/mmhpb;mmhpb";

// ---------------------------------------------------------------------------
// miniMiniHub V001 — Phase 0 (walking skeleton)
// Tunnel sortant : l'enfant (miniMiniHub) initie ; le parent (minihub) pousse.
// Plaintext en Phase 0 (D-20) ; mTLS en Phase 1.
// ---------------------------------------------------------------------------

service MiniMiniHubControl {
  // L'enfant signale sa présence (état pour le graphe). Unary.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // L'enfant ouvre une server-stream ; le parent pousse les commandes au fil de l'eau.
  rpc PollCommand(PollRequest) returns (stream Command);

  // Proxy de sortie (D-17) : l'enfant ouvre ce flux bidi pour relayer une
  // connexion d'égress. 1er frame = conn_id ; ensuite bytes dans les 2 sens.
  rpc EgressStream(stream EgressFrame) returns (stream EgressFrame);
}

message HeartbeatRequest {
  string miniminihub_id = 1;
  string slug            = 2;
  int64  client_ts_ms    = 3;
  uint64 sequence        = 4;
}

message HeartbeatResponse {
  bool  accepted         = 1;
  int64 server_ts_ms     = 2;
  int32 next_interval_ms = 3;
  string trace_id        = 4;
}

message PollRequest {
  string miniminihub_id = 1;
  string slug           = 2;
}

message Command {
  string command_id  = 1;
  int64  issued_at_ms = 2;
  oneof payload {
    PingCommand         ping          = 10;
    EgressOpenCommand   egress_open   = 11;
    RotateEgressCommand rotate_egress = 12; // V002 P2 : NEWNYM — rotation de l'IP de sortie TOR
  }
}

// Phase 0 : commande no-op pour prouver le canal descendant.
message PingCommand {
  string note = 1;
}

// V002 P2 : le parent demande à l'enfant de renouveler ses circuits TOR
// (SIGNAL NEWNYM sur le ControlPort local 9051) → nouvelle IP de sortie TOR.
message RotateEgressCommand {
  string request_id = 1; // corrélation / trace
}

// Phase 3 : le parent demande à l'enfant d'ouvrir une sortie vers host:port.
message EgressOpenCommand {
  string conn_id = 1; // corrèle la future EgressStream
  string host    = 2;
  uint32 port    = 3;
  bool   via_tor = 5; // V002 P2 : sortir via TOR (SOCKS5 local) au lieu du direct
}

// Frame du flux d'égress (bidi). conn_id présent sur le 1er frame.
message EgressFrame {
  string conn_id = 1;
  bytes  data    = 2;
  bool   close   = 3;
  string error   = 4;
}
