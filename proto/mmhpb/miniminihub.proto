syntax = "proto3";

package miniminihub.v1;

option go_package = "github.com/jmlmvi/miniminihub/proto/mmhpb;mmhpb";

// ---------------------------------------------------------------------------
// miniMiniHub V001 — Phase 0 (walking skeleton)
// Tunnel sortant : l'enfant (miniMiniHub) initie ; le parent (minihub) pousse.
// Plaintext en Phase 0 (D-20) ; mTLS en Phase 1.
// ---------------------------------------------------------------------------

service MiniMiniHubControl {
  // L'enfant signale sa présence (état pour le graphe). Unary.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // L'enfant ouvre une server-stream ; le parent pousse les commandes au fil de l'eau.
  rpc PollCommand(PollRequest) returns (stream Command);

  // Proxy de sortie (D-17) : l'enfant ouvre ce flux bidi pour relayer une
  // connexion d'égress. 1er frame = conn_id ; ensuite bytes dans les 2 sens.
  rpc EgressStream(stream EgressFrame) returns (stream EgressFrame);

  // V002 P3 : l'enfant remonte le résultat d'une commande async (envoi SMTP),
  // corrélé par request_id. Unary sortant.
  rpc PushResult(ResultMsg) returns (ResultAck);
}

message HeartbeatRequest {
  string miniminihub_id = 1;
  string slug            = 2;
  int64  client_ts_ms    = 3;
  uint64 sequence        = 4;
  // V002 P1 — remontée de charge (léger) : /proc + statfs à chaque battement.
  int32  cpu_load_pct    = 5;
  int32  mem_pct         = 6;
  int32  disk_pct        = 7;
  map<string, int32> conns_by_service = 8;
}

message HeartbeatResponse {
  bool  accepted         = 1;
  int64 server_ts_ms     = 2;
  int32 next_interval_ms = 3;
  string trace_id        = 4;
}

message PollRequest {
  string miniminihub_id = 1;
  string slug           = 2;
}

message Command {
  string command_id  = 1;
  int64  issued_at_ms = 2;
  oneof payload {
    PingCommand         ping          = 10;
    EgressOpenCommand   egress_open   = 11;
    RotateEgressCommand rotate_egress = 12; // V002 P2 : NEWNYM — rotation de l'IP de sortie TOR
    SmtpSendCommand     smtp_send     = 13; // V002 P3 : remise MX directe d'un message
    ConfigureBatchCommand configure_batch = 14; // V002 P5 : (re)configure les jobs batch
  }
}

// V002 P5 — Agent Batch (voir grpc-contracts pour la doc complète).
message ReportHub {
  string hub_key             = 1;
  repeated string recipients = 2; // vide = pas de mail
  string subject_tpl         = 3;
}

message JobSpec {
  string id               = 1;
  bool   enabled          = 2;
  string schedule         = 3;
  string timezone         = 4;
  string agent_kind       = 5;
  map<string,string> agent_params = 6;
  string prompt_template  = 7;
  map<string,string> prompt_vars  = 8;
  int64  timeout_ms       = 9;
  string overlap          = 10;
  int32  max_attempts     = 11;
  int64  backoff_ms       = 12;
  repeated ReportHub report_hubs = 13;
}

message ConfigureBatchCommand {
  repeated JobSpec jobs = 1;
}

message BatchReport {
  string job_id           = 1;
  string run_id           = 2;
  string status           = 3;
  bytes  report_md        = 4;
  map<string,string> metrics = 5;
  int64  started_at_ms    = 6;
  int64  ended_at_ms      = 7;
  string error            = 8;
  repeated ReportHub report_hubs = 9;
}

// V002 P3 — remise MX directe (port 25) d'un message par l'enfant (rôle smtp).
message SmtpSendCommand {
  string request_id       = 1;
  string mail_from        = 2;
  repeated string rcpt_to = 3;
  bytes  data             = 4;
  bool   starttls         = 5;
  string helo             = 6;
}

message ResultMsg {
  string request_id = 1;
  oneof payload {
    SmtpResult smtp_result = 2;
    BatchReport batch_report = 3; // V002 P5
  }
}

message SmtpResult {
  bool   accepted     = 1;
  string status       = 2; // SENT | DEFERRED | FAILED
  string smtp_code    = 3;
  string smtp_message = 4;
  string mx_host      = 5;
  string error        = 6;
}

message ResultAck {
  bool accepted = 1;
}

// Phase 0 : commande no-op pour prouver le canal descendant.
message PingCommand {
  string note = 1;
}

// V002 P2 : le parent demande à l'enfant de renouveler ses circuits TOR
// (SIGNAL NEWNYM sur le ControlPort local 9051) → nouvelle IP de sortie TOR.
message RotateEgressCommand {
  string request_id = 1; // corrélation / trace
}

// Phase 3 : le parent demande à l'enfant d'ouvrir une sortie vers host:port.
message EgressOpenCommand {
  string conn_id = 1; // corrèle la future EgressStream
  string host    = 2;
  uint32 port    = 3;
  bool   via_tor = 5; // V002 P2 : sortir via TOR (SOCKS5 local) au lieu du direct
}

// Frame du flux d'égress (bidi). conn_id présent sur le 1er frame.
message EgressFrame {
  string conn_id = 1;
  bytes  data    = 2;
  bool   close   = 3;
  string error   = 4;
}
